<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Feature - Dokzie</title>
    <link rel="icon" href="dokzie_icon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="h-full w-full gradient-bg text-white overflow-auto">
    <div class="w-full min-h-full">
        <!-- Navigation -->
        <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-4 backdrop-blur-md bg-slate-950/90 border-b border-red-600/20">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <img src="dokzie_icon.ico" class="w-10 h-10 object-contain rounded-xl shadow-lg" alt="Dokzie Logo">
                    <span class="text-xl font-bold text-white">Dokzie</span>
                </div>
                <div class="hidden md:flex items-center gap-8">
                    <a href="index.html#search" class="text-gray-300 hover:text-red-400 transition-colors">Find</a>
                    <a href="index.html#replace" class="text-gray-300 hover:text-red-400 transition-colors">Fix</a>
                    <a href="version-history.html" class="text-gray-300 hover:text-red-400 transition-colors">Versions</a>
                    <a href="contact.html" class="text-gray-300 hover:text-red-400 transition-colors">Contact Us</a>
                </div>
                <div class="flex items-center gap-3">
                    <button class="btn-primary px-4 py-2 rounded-lg text-sm font-medium text-white" onclick="window.location.href='index.html#pricing'">Get Started</button>
                </div>
            </div>
        </nav>

        <section class="pt-32 pb-20 px-6">
            <div class="max-w-3xl mx-auto">
                <div class="text-center mb-12">
                    <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-white">Shape the Product</h1>
                    <p class="text-xl text-gray-400 leading-relaxed">
                        We build Dokzie for you. If there's a file format we don't support or a feature that would save you an extra hour a week, let us know.
                    </p>
                </div>

                <div class="glow-card rounded-2xl p-8 md:p-10 border border-slate-700">
                    <form action="https://formspree.io/f/mkoqvjwe" method="POST" class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">What's the feature idea?</label>
                            <input type="text" name="feature_title" placeholder="e.g., PDF Support, Regex Search" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-red-600 transition-colors">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">Describe the pain it solves</label>
                            <textarea name="description" rows="5" placeholder="Tell us about the document maintenance hell you want to avoid..." required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-red-600 transition-colors resize-none"></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">Your Email (We'll notify you if we build it!)</label>
                            <input type="email" name="_replyto" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-red-600 transition-colors">
                        </div>

                        <button type="submit" class="btn-primary w-full py-4 rounded-xl font-bold text-lg text-white">Submit Request</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="py-12 px-6 border-t border-slate-800 bg-slate-950">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="flex items-center gap-2">
                    <img src="dokzie_icon.ico" class="w-8 h-8 rounded-lg" alt="Dokzie">
                    <span class="text-lg font-bold text-gray-300">Dokzie</span>
                </div>
                <div class="flex gap-8 text-sm text-gray-500">
                    <a href="index.html" class="hover:text-red-400 transition-colors">Home</a>
                    <a href="version-history.html" class="hover:text-red-400 transition-colors">Version History</a>
                    <a href="contact.html" class="hover:text-red-400 transition-colors">Contact Support</a>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
